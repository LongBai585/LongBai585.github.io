<!-- ========== 看板娘配置 ========== -->
<script>
  (function() {
    const MY_VERSION = "v1.2.0";
    const officialCdn = "https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main";
    const myModelCdn = `https://cdn.jsdelivr.net/gh/LongBai585/static-resource@${MY_VERSION}`;
    const config = {
      path: {
        homePath: "/",
        modelPath: myModelCdn + "/",
        cssPath: officialCdn + "/waifu.css",
        tipsJsonPath: officialCdn + "/waifu-tips.json",
        tipsJsPath: officialCdn + "/waifu-tips.js",
        live2dCorePath: officialCdn + "/Core/live2dcubismcore.js",
        live2dSdkPath: officialCdn + "/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };
    function loadResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag = type === "css" ? document.createElement("link") : document.createElement("script");
        if (type === "css") { tag.rel = "stylesheet"; tag.href = url; }
        else { tag.src = url; }
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(url);
        document.head.appendChild(tag);
      });
    }
    const loadingEl = document.getElementById('waifuLoading');
    function showLoading(show) { if (loadingEl) { if (show) loadingEl.classList.add('show'); else loadingEl.classList.remove('show'); } }
    let retryCount = 0, MAX_RETRY = 2;
    function initWaifu() {
      showLoading(true);
      Promise.all([
        loadResource(config.path.cssPath, "css"),
        loadResource(config.path.live2dCorePath, "js"),
        loadResource(config.path.live2dSdkPath, "js"),
        loadResource(config.path.tipsJsPath, "js")
      ]).then(() => {
        if (typeof initWidget === "function") {
          initWidget({
            waifuPath: config.path.tipsJsonPath,
            cdnPath: config.path.modelPath,
            tools: config.tools,
            dragEnable: config.drag.enable,
            dragDirection: config.drag.direction,
            switchType: config.switchType
          });
          setTimeout(() => showLoading(false), 2000);
        } else throw new Error("initWidget not found");
      }).catch(err => {
        console.error("[Live2D] 加载失败:", err);
        if (retryCount < MAX_RETRY) { retryCount++; setTimeout(initWaifu, 3000); }
        else showLoading(false);
      });
    }
    if (screen.width >= 768) {
      if (window.requestIdleCallback) requestIdleCallback(() => initWaifu(), { timeout: 2000 });
      else setTimeout(initWaifu, 500);
    } else {
      setTimeout(initWaifu, 1000);
    }
  })();
</script>

<!-- ========== 手机端看板娘显示/隐藏控制 ========== -->
<script>
  (function() {
    const isMobile = screen.width <= 768;
    if (!isMobile) return;

    const waifuDiv = document.getElementById('waifu');
    const toggleBtn = document.getElementById('toggleWaifuBtn');
    if (!waifuDiv || !toggleBtn) return;

    let waifuVisible = localStorage.getItem('waifu_visible_mobile');
    if (waifuVisible === null) {
      waifuVisible = '0';
    }
    function updateUI() {
      if (waifuVisible === '1') {
        waifuDiv.style.display = 'block';
        toggleBtn.innerHTML = '✨ 隐藏看板娘';
      } else {
        waifuDiv.style.display = 'none';
        toggleBtn.innerHTML = '✨ 显示看板娘';
      }
    }
    updateUI();

    toggleBtn.addEventListener('click', () => {
      if (waifuVisible === '1') {
        waifuVisible = '0';
      } else {
        waifuVisible = '1';
      }
      localStorage.setItem('waifu_visible_mobile', waifuVisible);
      updateUI();
    });
  })();
</script>

      document.addEventListener('keydown', (e) => {

  })();
