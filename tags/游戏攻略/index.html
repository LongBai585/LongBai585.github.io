<!-- ========== 看板娘（官方核心库 + 您的模型和样式） ========== -->
<script>
  // 官方 CDN（核心库）
  const officialCdn = "https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main";
  // 您自己的 CDN（模型和样式）
  const myCdn = "https://cdn.jsdelivr.net/gh/LongBai585/static-resource@v1.1.2";

  const config = {
    path: {
      homePath: "/",
      modelPath: myCdn + "/",                     // 模型根目录（含 model_list.json 和 model/ 文件夹）
      cssPath: myCdn + "/waifu.css",
      tipsJsonPath: officialCdn + "/waifu-tips.json",
      tipsJsPath: officialCdn + "/waifu-tips.js",
      live2dCorePath: officialCdn + "/Core/live2dcubismcore.js",
      live2dSdkPath: officialCdn + "/live2d-sdk.js"
    },
    tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
    drag: { enable: true, direction: ["x", "y"] },
    switchType: "order"
  };

  function loadExternalResource(url, type) {
    return new Promise((resolve, reject) => {
      let tag;
      if (type === "css") {
        tag = document.createElement("link");
        tag.rel = "stylesheet";
        tag.href = url;
      } else if (type === "js") {
        tag = document.createElement("script");
        tag.src = url;
      }
      if (tag) {
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(url);
        document.head.appendChild(tag);
      }
    });
  }

  if (screen.width >= 768) {
    Promise.all([
      loadExternalResource(config.path.cssPath, "css"),
      loadExternalResource(config.path.live2dCorePath, "js"),
      loadExternalResource(config.path.live2dSdkPath, "js"),
      loadExternalResource(config.path.tipsJsPath, "js")
    ]).then(() => {
      initWidget({
        waifuPath: config.path.tipsJsonPath,
        cdnPath: config.path.modelPath,
        tools: config.tools,
        dragEnable: config.drag.enable,
        dragDirection: config.drag.direction,
        switchType: config.switchType
      });
    });
  }
</script>
