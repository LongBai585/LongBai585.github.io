<!DOCTYPE html>

<body>
<div class="page-transition"></div>
<div class="site-wrapper">
    <!-- 头图区域 + 波浪效果 -->
    <div class="hero-header">
        <div class="hero-image-wrapper">
            <img class="hero-img" src="/images/header.jpg" alt="头图">
            <!-- SVG 波浪 -->
            <svg class="wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120">
                <path fill="rgba(255,255,255,0.2)" fill-opacity="1" d="M0,64L80,69.3C160,75,320,85,480,80C640,75,800,53,960,48C1120,43,1280,53,1360,58.7L1440,64L1440,120L1360,120C1280,120,1120,120,960,120C800,120,640,120,480,120C320,120,160,120,80,120L0,120Z"></path>
            </svg>
        </div>
        <div class="profile-avatar">
            <div class="avatar-wrapper">
                <img id="profileAvatar" class="rotating-avatar" src="/images/avatar.png" alt="头像">
            </div>
        </div>
    </div>

    <div class="content-container">
        <div class="blog-info-header">
            <h1 class="blog-title">汐音_Shione</h1>

            <div class="blog-desc">记录开发故事，探寻开发过程</div>
            <div class="signature">✎ 一期一会，步履不停</div>
        </div>

        <!-- 统计卡片网格 -->
        <div class="stats-grid">
            <div class="stat-item"><i class="fas fa-file-alt"></i> <span id="postCount">0</span> <span>記事</span></div>
            <div class="stat-item"><i class="fas fa-folder"></i> <span id="categoryCount">0</span> <span>カテゴリー</span></div>
            <div class="stat-item"><i class="fas fa-tags"></i> <span id="tagCount">0</span> <span>タグ</span></div>
            <div class="stat-item"><i class="fas fa-calendar-day"></i> <span id="runDays">0</span> <span>運用日数</span></div>
            <div class="stat-item"><i class="fas fa-sync-alt"></i> <span id="lastUpdate">—</span> <span>最終更新</span></div>
        </div>

        <!-- 通知栏 -->
        <div class="notice-bar">
            <i class="fas fa-bell"></i>
            <span>✨ 欢迎来到二次元幻境 | 音乐陪伴每一刻 ✨</span>
        </div>

        <!-- 时间 + 打字机 -->
        <div class="time-ticker">
            <div class="live-time" id="liveClock"></div>
            <div class="scroll-area">
                <div class="scroll-content" id="scrollText"></div>
            </div>
        </div>

        <!-- 文章主体 -->
        <div class="post-list">
    
        
            <div class="post-item">
                <div class="post-date-large">
                    <span class="post-day">02</span>

                        <i class="fas fa-user"></i> 关于我

</div>
