<!-- ========== 看板娘配置（官方核心库 + 你的模型 v1.1.8） ========== -->
<script>
  (function() {
    // 你的模型仓库标签
    const MY_VERSION = "v1.1.8";
    const officialCdn = "https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main";
    const myCdn = `https://cdn.jsdelivr.net/gh/LongBai585/static-resource@${MY_VERSION}`;

    const config = {
      path: {
        homePath: "/",
        modelPath: myCdn + "/",
        cssPath: officialCdn + "/waifu.css",
        tipsJsonPath: officialCdn + "/waifu-tips.json",
        tipsJsPath: officialCdn + "/waifu-tips.js",
        live2dCorePath: officialCdn + "/Core/live2dcubismcore.js",
        live2dSdkPath: officialCdn + "/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    function loadResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag;
        if (type === "css") {
          tag = document.createElement("link");
          tag.rel = "stylesheet";
          tag.href = url;
        } else if (type === "js") {
          tag = document.createElement("script");
          tag.src = url;
        }
        if (tag) {
          tag.onload = () => resolve(url);
          tag.onerror = () => reject(url);
          document.head.appendChild(tag);
        }
      });
    }

    // 预检模型配置（适配你的嵌套数组格式）
    async function validateModels() {
      try {
        const res = await fetch(config.path.modelPath + "model_list.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        // 扁平化处理：支持 { models: [[...], [...]] } 或直接数组
        let modelsArray = [];
        if (Array.isArray(data)) {
          modelsArray = data;
        } else if (data.models && Array.isArray(data.models)) {
          for (let group of data.models) {
            if (Array.isArray(group)) {
              modelsArray.push(...group);
            }
          }
        } else {
          throw new Error("model_list.json 格式不支持");
        }
        console.log(`[Live2D] 共发现 ${modelsArray.length} 个模型:`, modelsArray);
        
        let validCount = 0;
        for (const modelName of modelsArray) {
          // 尝试两种可能的配置文件路径
          const pathsToTry = [
            config.path.modelPath + `model/${modelName}/index.json`,
            config.path.modelPath + `model/${modelName}/${modelName}.model3.json`
          ];
          let configRes = null;
          for (const url of pathsToTry) {
            try {
              const testRes = await fetch(url, { method: 'HEAD' });
              if (testRes.ok) {
                configRes = await fetch(url);
                break;
              }
            } catch(e) {}
          }
          if (!configRes) {
            console.error(`❌ 模型 "${modelName}" 的配置文件未找到`);
            continue;
          }
          const json = await configRes.json();
          const mocFile = json.FileReferences?.Moc;
          if (!mocFile) {
            console.error(`❌ 模型 "${modelName}" 未指定 Moc 文件`);
            continue;
          }
          const baseDir = configRes.url.substring(0, configRes.url.lastIndexOf('/') + 1);
          const mocUrl = baseDir + mocFile;
          const mocCheck = await fetch(mocUrl, { method: 'HEAD' });
          if (mocCheck.ok) {
            console.log(`✅ 模型 "${modelName}" 的 .moc3 文件存在`);
            validCount++;
          } else {
            console.error(`❌ 模型 "${modelName}" 缺少 .moc3 文件: ${mocUrl}`);
          }
        }
        console.log(`[Live2D] 有效模型: ${validCount}/${modelsArray.length}`);
        return validCount > 0;
      } catch (e) {
        console.error("[Live2D] model_list.json 加载失败:", e);
        return false;
      }
    }

    if (screen.width >= 768) {
      validateModels().then(hasValidModels => {
        if (!hasValidModels) {
          console.warn("[Live2D] 没有有效模型，看板娘不加载");
          return;
        }
        Promise.all([
          loadResource(config.path.cssPath, "css"),
          loadResource(config.path.live2dCorePath, "js"),
          loadResource(config.path.live2dSdkPath, "js"),
          loadResource(config.path.tipsJsPath, "js")
        ]).then(() => {
          if (typeof initWidget === "function") {
            console.log("[Live2D] 初始化看板娘，模型路径:", config.path.modelPath);
            initWidget({
              waifuPath: config.path.tipsJsonPath,
              cdnPath: config.path.modelPath,
              tools: config.tools,
              dragEnable: config.drag.enable,
              dragDirection: config.drag.direction,
              switchType: config.switchType
            });
          } else {
            console.error("[Live2D] initWidget 未定义");
          }
        }).catch(err => {
          console.error("[Live2D] 核心资源加载失败:", err);
        });
      });
    }
  })();
</script>

<!-- ========== 水印切换功能（电脑 Ctrl+M，手机双击画布） ========== -->
<script>
  (function() {
    const WATERMARK_PARAM = "ParamWatermark"; // 根据实际模型修改
    let watermarkState = 1;

    function setWatermarkParam(value) {
      if (window.live2d && typeof window.live2d.setParameter === 'function') {
        window.live2d.setParameter(WATERMARK_PARAM, value);
        return true;
      }
      const canvas = document.getElementById('live2d');
      if (canvas && canvas.live2dModel && typeof canvas.live2dModel.setParameterValue === 'function') {
        canvas.live2dModel.setParameterValue(WATERMARK_PARAM, value);
        return true;
      }
      return false;
    }

    function toggleWatermark() {
      const newValue = watermarkState === 1 ? 0 : 1;
      const success = setWatermarkParam(newValue);
      if (success) {
        watermarkState = newValue;
        if (typeof showMessage === 'function') {
          showMessage(watermarkState === 1 ? '💧 水印已显示' : '✨ 水印已隐藏', 2000);
        }
      } else {
        if (typeof showMessage === 'function') {
          showMessage('⚠️ 当前模型不支持水印参数切换', 2000);
        }
        console.warn(`[Watermark] 无法设置参数 ${WATERMARK_PARAM}`);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'm') {
        e.preventDefault();
        toggleWatermark();
      }
    });

    let lastTouchEnd = 0;
    const canvas = document.getElementById('live2d');
    if (canvas) {
      canvas.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd < 300) {
          e.preventDefault();
          toggleWatermark();
        }
        lastTouchEnd = now;
      });
    }

    setTimeout(() => {
      if (typeof showMessage === 'function') {
        showMessage('💡 电脑 Ctrl+M / 手机双击画布 可切换水印', 5000);
      }
    }, 3000);
  })();
</script>

<!-- ========== 模型切换快捷键（Ctrl+Shift+M） ========== -->
<script>
  (function() {
    function bindModelShortcut() {
      if (typeof loadOtherModel !== 'function') {
        setTimeout(bindModelShortcut, 100);
        return;
      }
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'm') {
          e.preventDefault();
          if (typeof showMessage === 'function') {
            showMessage('✨ 切换模型 ✨', 2000);
          }
          loadOtherModel();
        }
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bindModelShortcut);
    } else {
      bindModelShortcut();
    }
  })();
</script>
